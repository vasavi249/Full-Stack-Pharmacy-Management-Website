<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - PharmaPlus</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Pharma<span>Admin</span></a>
            <div class="nav-links">
                <a href="#" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-medicines.html">Medicines</a>
                <a href="admin-categories.html" class="active">Categories</a>
                <a href="admin-orders.html">Orders</a>
                <a href="admin-users.html">Users</a>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Manage Categories</h2>
                <button class="btn btn-primary" onclick="document.getElementById('add-cat-modal').classList.remove('hidden')">Add Category</button>
            </div>
            
            <div class="card table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Category Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="cat-table">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Add Modal -->
            <div id="add-cat-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:9999;">
                <div class="card" style="width: 400px;">
                    <h3 class="mb-3">Add Category</h3>
                    <form id="add-cat-form">
                        <div class="form-group">
                            <label class="form-label">Category Name</label>
                            <input type="text" name="categoryName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control"></textarea>
                        </div>
                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-success flex-1">Save</button>
                            <button type="button" class="btn btn-danger flex-1" onclick="document.getElementById('add-cat-modal').classList.add('hidden')">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(!isAdmin()) return window.location.href = 'index.html';
            loadTable();

            document.getElementById('add-cat-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = Object.fromEntries(new FormData(e.target));
                try {
                    await fetchAPI('/categories', { method: 'POST', body: JSON.stringify(data) });
                    showToast('Category added successfully');
                    document.getElementById('add-cat-modal').classList.add('hidden');
                    e.target.reset();
                    loadTable();
                } catch(e) {}
            });
        });

        async function loadTable() {
            const tbody = document.getElementById('cat-table');
            try {
                const cats = await fetchAPI('/categories');
                tbody.innerHTML = cats.map(cat => `
                    <tr>
                        <td>${cat.categoryName}</td>
                        <td>${cat.description}</td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteCat('${cat._id}')" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="3">Failed to load</td></tr>';
            }
        }

        async function deleteCat(id) {
            if(!confirm('Are you sure you want to delete this category?')) return;
            try {
                await fetchAPI(`/categories/${id}`, { method: 'DELETE' });
                showToast('Deleted');
                loadTable();
            } catch(e) {}
        }
    </script>
</body>
</html>
